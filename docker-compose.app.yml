# 机器 A：仅应用层（Web + Backend + Scheduler）
# 主库 MySQL 与 upload/ 在机器 B，通过 DB_HOST 与 NFS 挂载访问。
# 启动：./start-app.sh  或  docker compose -f docker-compose.app.yml up -d --build

name: image-db-app

x-backend-environment: &backend-environment
  DEBUG: "False"
  SECRET_KEY: ${SECRET_KEY:-change-me-docker-secret-key}
  IMAGE_ACCESS_SECRET: ${IMAGE_ACCESS_SECRET:-change-me-docker-image-secret}
  DB_ENGINE: mysql
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT:-3306}
  DB_NAME: ${MYSQL_DATABASE:-image_db}
  DB_USER: ${MYSQL_USER:-image_db}
  DB_PASSWORD: ${MYSQL_PASSWORD}
  DB_CHARSET: utf8
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
  UPLOAD_ROOT: /app/upload
  THUMB_CACHE_ROOT: /app/backend/thumb_cache
  LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-90}
  DELETED_IMAGE_RETENTION_DAYS: ${DELETED_IMAGE_RETENTION_DAYS:-30}

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *backend-environment
      GUNICORN_BIND: "0.0.0.0:8000"
    volumes:
      - ./upload:/app/upload
      - thumb_cache:/app/backend/thumb_cache
    expose:
      - "8000"

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/app/docker/maintenance-loop.sh"]
    environment:
      <<: *backend-environment
      MAINTENANCE_INTERVAL_HOURS: ${MAINTENANCE_INTERVAL_HOURS:-24}
    volumes:
      - ./upload:/app/upload
      - thumb_cache:/app/backend/thumb_cache

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  thumb_cache:
