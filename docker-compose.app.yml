# 机器 A：MySQL + Web + Backend + Scheduler
# 图片存储：MinIO S3（STORAGE_BACKEND=minio，见 .env.app.example）
# 启动：./start-app.sh  或  docker compose -f docker-compose.app.yml up -d --build

name: image-db-app

x-backend-environment: &backend-environment
  DEBUG: "False"
  SECRET_KEY: ${SECRET_KEY:-change-me-docker-secret-key}
  IMAGE_ACCESS_SECRET: ${IMAGE_ACCESS_SECRET:-change-me-docker-image-secret}
  DB_ENGINE: mysql
  DB_HOST: db
  DB_PORT: "3306"
  DB_NAME: ${MYSQL_DATABASE:-image_db}
  DB_USER: ${MYSQL_USER:-image_db}
  DB_PASSWORD: ${MYSQL_PASSWORD}
  DB_CHARSET: utf8
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
  STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
  UPLOAD_ROOT: /app/upload
  THUMB_CACHE_ROOT: /app/backend/thumb_cache
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://192.168.9.9:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
  MINIO_BUCKET: ${MINIO_BUCKET:-biox}
  MINIO_PREFIX: ${MINIO_PREFIX:-data/image_db}
  MINIO_SECURE: ${MINIO_SECURE:-false}
  LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-90}
  DELETED_IMAGE_RETENTION_DAYS: ${DELETED_IMAGE_RETENTION_DAYS:-30}
  BLOB_MIGRATION_POLL_SECONDS: ${BLOB_MIGRATION_POLL_SECONDS:-10}
  BLOB_MIGRATION_UPLOAD_WORKERS: ${BLOB_MIGRATION_UPLOAD_WORKERS:-2}

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-image_db}
      MYSQL_USER: ${MYSQL_USER:-image_db}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/sql:ro
      - ./docker/mysql-init/00-init-app.sh:/docker-entrypoint-initdb.d/00-init-app.sh:ro
    ports:
      - "127.0.0.1:${MYSQL_PUBLISH_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *backend-environment
      GUNICORN_BIND: "0.0.0.0:8000"
    volumes:
      - thumb_cache:/app/backend/thumb_cache
    expose:
      - "8000"

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/app/docker/maintenance-loop.sh"]
    environment:
      <<: *backend-environment
      MAINTENANCE_INTERVAL_HOURS: ${MAINTENANCE_INTERVAL_HOURS:-24}
    volumes:
      - thumb_cache:/app/backend/thumb_cache

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  mysql_data:
  thumb_cache:
